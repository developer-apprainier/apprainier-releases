name: flutter_apprainier_plugin
description: Flutter bridge for AppRainier surveys, announcements, live cards, feature flags, experiments, and message center.
version: 2.0.0
homepage: https://apprainier.com

environment:
  sdk: ^3.10.4
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.apprainier.flutter_apprainier_plugin
        pluginClass: FlutterApprainierPlugin
      ios:
        pluginClass: FlutterApprainierPlugin
